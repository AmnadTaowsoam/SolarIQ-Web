name: Frontend Deploy
on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & Push
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev
          docker build -t asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/solariq/web:${{ github.sha }} .
          docker push asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/solariq/web:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy solariq-web-stg \
            --image asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/solariq/web:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --port 3000 \
            --allow-unauthenticated

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy solariq-web \
            --image asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/solariq/web:${{ github.sha }} \
            --region asia-southeast1 \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 50 \
            --port 3000 \
            --allow-unauthenticated
