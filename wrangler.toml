# WK-109: Performance Optimization - Cloudflare Pages Configuration
name = "solariq-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# WK-109: Performance Optimization - Cache rules for static assets
[[rules]]
type = "File"
globs = ["**/*.jpg", "**/*.jpeg", "**/*.png", "**/*.gif", "**/*.webp", "**/*.avif", "**/*.svg", "**/*.ico"]
fallthrough = false

[[rules]]
type = "File"
globs = ["**/*.woff", "**/*.woff2", "**/*.ttf", "**/*.eot"]
fallthrough = false

[[rules]]
type = "File"
globs = ["**/*.js", "**/*.css"]
fallthrough = false

# WK-109: Performance Optimization - Cache headers
[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[build.environment]
NODE_VERSION = "20"
NEXT_PUBLIC_APP_URL = "https://solariqapp.com"

# WK-109: Performance Optimization - Cache TTL configuration
[assets]
directory = "public"
binding = "ASSETS"

# WK-109: Performance Optimization - Edge caching
[vars]
CACHE_CONTROL_STATIC = "public, max-age=31536000, immutable"
CACHE_CONTROL_API = "public, max-age=60, s-maxage=300"
